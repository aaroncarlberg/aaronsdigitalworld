<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AaronsDigitalWorld</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      text-align: center;
    }

    .logo {
      width: 280px;
      max-width: 85%;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      font-size: 52px;
      margin: 0 0 16px;
      line-height: 1.1;
    }

    .tagline {
      font-size: 24px;
      color: #d0d0d0;
      max-width: 760px;
      margin: 0 auto 36px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      background: #d6a100;
      color: #111111;
      text-decoration: none;
      font-weight: bold;
      font-size: 20px;
      padding: 16px 32px;
      border-radius: 8px;
      margin-bottom: 48px;
    }

    .button:hover {
      background: #e7b300;
    }

    .about {
      max-width: 760px;
      margin: 0 auto 48px;
      padding: 28px 24px;
      background: #141414;
      border: 1px solid #222222;
      border-radius: 12px;
    }

    .about h2 {
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .about p {
      margin: 0;
      font-size: 18px;
      color: #d0d0d0;
      line-height: 1.7;
    }

    .launch {
      font-size: 18px;
      color: #aaaaaa;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 40px 18px 60px;
      }

      h1 {
        font-size: 38px;
      }

      .tagline {
        font-size: 20px;
      }

      .button {
        font-size: 18px;
        width: 100%;
        max-width: 340px;
      }

      .about h2 {
        font-size: 24px;
      }

      .about p {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="AaronsDigitalWorld logo" class="logo">

    <h1>AaronsDigitalWorld™</h1>

    <p class="tagline">
      E-books and guides designed to share knowledge and insights.
    </p>

    <a href="#" class="button">Browse eBooks &amp; Guides</a>

    <div class="about">
      <h2>About</h2>
      <p>
        AaronsDigitalWorld™ is a digital brand focused on creating e-books and guides
        designed to share useful knowledge, ideas, and practical insight.
      </p>
    </div>

    <p class="launch">Website launching soon.</p>
  </div>
</body>
</html>
